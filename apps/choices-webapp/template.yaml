AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Two-player elimination game: DynamoDB (game state) + single Lambda
  (Function URL) with Web Push notifications.

Parameters:
  VapidPublicKey:
    Type: String
    Description: VAPID public key (generate with `npx web-push generate-vapid-keys`)
  VapidPrivateKey:
    Type: String
    NoEcho: true
    Description: VAPID private key
  VapidSubject:
    Type: String
    Default: "mailto:admin@example.com"
    Description: "VAPID subject (mailto: or https: contact URL)"
  CorsAllowOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin for the Function URL (set to your CloudFront URL in prod)
  CustomDomain:
    Type: String
    Default: ""
    Description: Optional custom domain for the site, e.g. choices.austinjuliuskim.com (leave blank to use the CloudFront URL)
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in us-east-1 for CustomDomain (required if CustomDomain is set)
  TableName:
    Type: String
    Default: choices-games
    Description: DynamoDB table name (override for preview stacks so they don't collide with prod)

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomain, ""]]

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs24.x

Resources:
  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: handler.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref GamesTable
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
          VAPID_SUBJECT: !Ref VapidSubject
          CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - !Ref CorsAllowOrigin
          AllowMethods:
            - POST
          AllowHeaders:
            - content-type

  # --- Frontend hosting: private S3 bucket served via CloudFront (HTTPS) ---
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases: !If [HasCustomDomain, [!Ref CustomDomain], !Ref "AWS::NoValue"]
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: SiteS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: SiteS3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS managed "CachingOptimized" policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
        CustomErrorResponses:
          # SPA fallback: serve index.html for client-side routes
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution.Id}"

Outputs:
  ApiUrl:
    Description: Lambda Function URL (POST JSON actions here)
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  TableName:
    Description: DynamoDB table name
    Value: !Ref GamesTable
  VapidPublicKey:
    Description: Public key to embed in the frontend (VITE_VAPID_PUBLIC_KEY)
    Value: !Ref VapidPublicKey
  SiteBucketName:
    Description: S3 bucket to upload the built frontend (aws s3 sync dist/)
    Value: !Ref SiteBucket
  SiteUrl:
    Description: Your web app URL (open this!)
    Value: !If
      - HasCustomDomain
      - !Sub "https://${CustomDomain}"
      - !Sub "https://${SiteDistribution.DomainName}"
  DistributionDomainName:
    Description: CloudFront domain to point your DNS CNAME/alias at
    Value: !GetAtt SiteDistribution.DomainName
  DistributionId:
    Description: CloudFront distribution ID (for cache invalidations)
    Value: !Ref SiteDistribution
