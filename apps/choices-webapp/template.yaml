AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Two-player elimination game: DynamoDB (game state) + single Lambda
  (Function URL) with Web Push notifications.

Parameters:
  VapidPublicKey:
    Type: String
    Description: VAPID public key (generate with `npx web-push generate-vapid-keys`)
  VapidPrivateKey:
    Type: String
    NoEcho: true
    Description: VAPID private key
  VapidSubject:
    Type: String
    Default: "mailto:admin@example.com"
    Description: "VAPID subject (mailto: or https: contact URL)"
  CorsAllowOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin for the Function URL (set to your CloudFront URL in prod)
  CustomDomain:
    Type: String
    Default: ""
    Description: Optional custom domain for the site, e.g. choices.austinjuliuskim.com (leave blank to use the CloudFront URL)
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in us-east-1 for CustomDomain (required if CustomDomain is set)
  TableName:
    Type: String
    Default: choices-games
    Description: DynamoDB table name (override for preview stacks so they don't collide with prod)
  WebAclArn:
    Type: String
    Default: ""
    Description: >
      ARN of the CloudFront-scoped WAF WebACL from the ChoicesWebAppEdge
      stack (us-east-1). Blank = no WAF attached.
  OriginVerifySecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Shared secret CloudFront adds as an x-origin-verify header on API
      origin requests. Like VapidPrivateKey, pass once via
      --parameter-overrides (never commit); updates reuse the stored value.
      Blank = header not sent.
  EnforceOriginHeader:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      true = Lambda rejects requests missing x-origin-verify (direct Function
      URL calls get 403). Flip only after the frontend calls the CloudFront
      /api path and OriginVerifySecret is set.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomain, ""]]
  HasWebAcl: !Not [!Equals [!Ref WebAclArn, ""]]
  HasOriginSecret: !Not [!Equals [!Ref OriginVerifySecret, ""]]

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs24.x

Resources:
  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: handler.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref GamesTable
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
          VAPID_SUBJECT: !Ref VapidSubject
          CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
          ORIGIN_VERIFY_SECRET: !Ref OriginVerifySecret
          ENFORCE_ORIGIN_HEADER: !Ref EnforceOriginHeader
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - !Ref CorsAllowOrigin
          AllowMethods:
            - POST
            - GET
          AllowHeaders:
            - content-type

  # --- Frontend hosting: private S3 bucket served via CloudFront (HTTPS) ---
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # SPA fallback, scoped to the default (site) behavior only. The old
  # distribution-wide CustomErrorResponses (403/404 -> 200 index.html) would
  # corrupt API error bodies now that /api* shares the distribution.
  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-spa-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: Serve index.html for extension-less SPA routes
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (!request.uri.includes(".")) {
            request.uri = "/index.html";
          }
          return request;
        }

  # 1s TTL on getState: MinTTL=1 overrides the handler's no-cache (browsers
  # still revalidate), and request collapsing lets the edge absorb retry
  # storms hammering a single pairing. Cache key is the getState query only —
  # cache hits skip origin token validation, which is safe solely because
  # publicState carries no credentials (no `code` — see handler.mjs).
  ApiCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-api-1s"
        MinTTL: 1
        DefaultTTL: 1
        MaxTTL: 1
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: false
          EnableAcceptEncodingBrotli: false
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: whitelist
            QueryStrings: [action, pairingId, role, token]

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        WebACLId: !If [HasWebAcl, !Ref WebAclArn, !Ref "AWS::NoValue"]
        Aliases: !If [HasCustomDomain, [!Ref CustomDomain], !Ref "AWS::NoValue"]
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: SiteS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
          # Function URL as a custom origin -> same-origin /api (no CORS
          # preflights) with WAF + edge caching in front.
          - Id: ApiFunctionOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt ApiFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
            OriginCustomHeaders: !If
              - HasOriginSecret
              - - HeaderName: x-origin-verify
                  HeaderValue: !Ref OriginVerifySecret
              - !Ref "AWS::NoValue"
        DefaultCacheBehavior:
          TargetOriginId: SiteS3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS managed "CachingOptimized" policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: "/api*"
            TargetOriginId: ApiFunctionOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachePolicyId: !Ref ApiCachePolicy
            # AWS managed "AllViewerExceptHostHeader" origin request policy
            # (Function URLs reject a forwarded viewer Host header)
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution.Id}"

Outputs:
  ApiUrl:
    Description: Lambda Function URL (POST JSON actions here)
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  ApiBaseUrl:
    Description: API endpoint behind CloudFront (same-origin /api path)
    Value: !If
      - HasCustomDomain
      - !Sub "https://${CustomDomain}/api"
      - !Sub "https://${SiteDistribution.DomainName}/api"
  TableName:
    Description: DynamoDB table name
    Value: !Ref GamesTable
  VapidPublicKey:
    Description: Public key to embed in the frontend (VITE_VAPID_PUBLIC_KEY)
    Value: !Ref VapidPublicKey
  SiteBucketName:
    Description: S3 bucket to upload the built frontend (aws s3 sync dist/)
    Value: !Ref SiteBucket
  SiteUrl:
    Description: Your web app URL (open this!)
    Value: !If
      - HasCustomDomain
      - !Sub "https://${CustomDomain}"
      - !Sub "https://${SiteDistribution.DomainName}"
  DistributionDomainName:
    Description: CloudFront domain to point your DNS CNAME/alias at
    Value: !GetAtt SiteDistribution.DomainName
  DistributionId:
    Description: CloudFront distribution ID (for cache invalidations)
    Value: !Ref SiteDistribution
