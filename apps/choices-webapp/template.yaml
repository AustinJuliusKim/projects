AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Two-player elimination game: DynamoDB (game state) + single Lambda
  (Function URL) with Web Push notifications.

Parameters:
  VapidPublicKey:
    Type: String
    Description: VAPID public key (generate with `npx web-push generate-vapid-keys`)
  VapidPrivateKey:
    Type: String
    NoEcho: true
    Description: VAPID private key
  VapidSubject:
    Type: String
    Default: "mailto:admin@example.com"
    Description: "VAPID subject (mailto: or https: contact URL)"
  CorsAllowOrigin:
    Type: CommaDelimitedList
    Default: "*"
    Description: >
      Allowed CORS origins for the Function URL, comma-separated. Origins
      must be http(s) or "*" — the Lambda service rejects custom schemes
      (capacitor://localhost failed the 2026-07-04 prod deploy with
      InvalidRequest and rolled the stack back). The iOS shell bypasses
      WKWebView CORS via CapacitorHttp instead (capacitor.config.json).
  CustomDomain:
    Type: String
    Default: ""
    Description: Optional custom domain for the site, e.g. choices.austinjuliuskim.com (leave blank to use the CloudFront URL)
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in us-east-1 for CustomDomain (required if CustomDomain is set)
  TableName:
    Type: String
    Default: choices-games
    Description: DynamoDB table name (override for preview stacks so they don't collide with prod)
  WebAclArn:
    Type: String
    Default: ""
    Description: >
      ARN of the CloudFront-scoped WAF WebACL to keep associated with the
      distribution. For prod this is the CloudFront pricing-plan protection
      pack (CreatedByCloudFront-*) — the plan requires it and blocks
      removal/replacement, so this parameter must always match what's
      attached. Blank = no WAF (preview).
  OriginVerifySecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Shared secret CloudFront adds as an x-origin-verify header on API
      origin requests. Like VapidPrivateKey, pass once via
      --parameter-overrides (never commit); updates reuse the stored value.
      Blank = header not sent.
  EnforceOriginHeader:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      true = Lambda rejects requests missing x-origin-verify (direct Function
      URL calls get 403). Flip only after the frontend calls the CloudFront
      /api path and OriginVerifySecret is set.
  GoogleClientId:
    Type: String
    Default: ""
    Description: >
      Google OAuth client ID for Cognito sign-in. Blank = accounts disabled
      on this stack (no Cognito resources created, sign-in UI hidden).
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Google OAuth client secret (required when GoogleClientId is set)
  CognitoDomainPrefix:
    Type: String
    Default: ""
    Description: >
      Globally-unique Cognito hosted-UI domain prefix (e.g. choices-auth,
      choices-auth-preview). Required when GoogleClientId is set.
  CognitoCallbackUrl:
    Type: String
    Default: ""
    Description: >
      OAuth redirect URL — the site origin with a trailing slash
      (e.g. https://choices.austinjuliuskim.com/). Required when
      GoogleClientId is set.
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Stripe secret key (sk_live_/sk_test_). Blank = billing disabled (the
      upgrade UI hides itself, billing actions 400).
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe webhook signing secret (whsec_) for /api/stripe-webhook
  StripePriceMonthly:
    Type: String
    Default: ""
    Description: Stripe Price id for the monthly premium plan ($2.99/mo)
  StripePriceAnnual:
    Type: String
    Default: ""
    Description: Stripe Price id for the annual premium plan ($24/yr)
  AnonSalt:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      HMAC salt for the anonymized suggestion feed's pairHash (suggestion
      engine Phase 0). Generate with `openssl rand -hex 32` and pass via
      --parameter-overrides. Blank = anonymized S3 logging disabled
      (HIST# pair memory still recorded).
  CanarySecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Shared secret the Synthetics canary sends as x-canary-secret so the
      handler can exclude canary games from business metrics, the event
      lake, and the suggestion feed (ops/canary.yaml sends it). Blank =
      no traffic is treated as canary.
  PlacesApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Google Places API (New) key for the typeahead L3 layer, used only
      server-side by the Lambda proxy (restrict the key to that API in the
      Google Cloud console). Blank = Places layer dormant: the proxy returns
      empty results and the client (via the PlacesEnabled output) never
      calls it.
  BedrockModelId:
    Type: String
    Default: ""
    Description: >
      Bedrock model id for "Fill my 4" — use the US cross-region inference
      profile us.anthropic.claude-haiku-4-5-20251001-v1:0 (enable Anthropic
      model access in the Bedrock console first). Blank = feature dormant:
      fillMyFour 400s and the client (via the AiEnabled output) hides the
      button.
  AdminSubs:
    Type: String
    Default: ""
    Description: >
      Comma-separated Cognito subs allowed to read the owner-only activity
      dashboard (getAdminOverview). Blank = no one; the endpoint 403s and the
      #/admin view stays empty. Anonymous aggregates only — no per-user data.
  GlueDatabaseName:
    Type: String
    Default: choices_events
    Description: >
      Glue database for the event-lake tables. Glue names must be lowercase,
      so the stack name is unusable — preview overrides this to
      choices_events_preview (samconfig.toml).

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomain, ""]]
  HasWebAcl: !Not [!Equals [!Ref WebAclArn, ""]]
  HasOriginSecret: !Not [!Equals [!Ref OriginVerifySecret, ""]]
  HasCognito: !Not [!Equals [!Ref GoogleClientId, ""]]
  HasPlacesKey: !Not [!Equals [!Ref PlacesApiKey, ""]]
  HasBedrock: !Not [!Equals [!Ref BedrockModelId, ""]]

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs24.x

Resources:
  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Event-lake transport (Data Architecture Plan, Stage A). In-place
      # update: enabling a stream never replaces the table.
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: handler.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref GamesTable
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
          VAPID_SUBJECT: !Ref VapidSubject
          CORS_ALLOW_ORIGIN: !Join [",", !Ref CorsAllowOrigin]
          ORIGIN_VERIFY_SECRET: !Ref OriginVerifySecret
          ENFORCE_ORIGIN_HEADER: !Ref EnforceOriginHeader
          USER_POOL_ID: !If [HasCognito, !Ref UserPool, ""]
          USER_POOL_CLIENT_ID: !If [HasCognito, !Ref UserPoolClient, ""]
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          STRIPE_PRICE_MONTHLY: !Ref StripePriceMonthly
          STRIPE_PRICE_ANNUAL: !Ref StripePriceAnnual
          # Checkout/portal redirect base (trailing slash). Reuses the
          # Cognito callback URL — billing requires sign-in, so it's always
          # set when billing is; deriving from SiteDistribution would be a
          # circular dependency (distribution -> function URL -> function).
          SITE_URL: !Ref CognitoCallbackUrl
          SUGGEST_BUCKET: !Ref SuggestDataBucket
          ANON_SALT: !Ref AnonSalt
          CANARY_SECRET: !Ref CanarySecret
          PLACES_API_KEY: !Ref PlacesApiKey
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          ADMIN_SUBS: !Ref AdminSubs
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - S3WritePolicy:
            BucketName: !Ref SuggestDataBucket
        # Cross-region inference profiles need InvokeModel on both the
        # profile and the underlying regional foundation-model ARNs.
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*"
                - "arn:aws:bedrock:*::foundation-model/anthropic.*"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: !Ref CorsAllowOrigin
          AllowMethods:
            - POST
            - GET
          AllowHeaders:
            - content-type
            - authorization
          MaxAge: 300

  # --- Accounts: Cognito user pool, Google-federated only (v1). Sign in with
  # Apple joins when the Apple Developer enrollment lands (iOS Phase B). ---
  UserPool:
    Type: AWS::Cognito::UserPool
    Condition: HasCognito
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      # Federated-only: no self-service signup with passwords.
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]

  GoogleIdp:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasCognito
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "openid email profile"
      AttributeMapping:
        email: email
        name: name
        username: sub

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: HasCognito
    DependsOn: GoogleIdp
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: web
      GenerateSecret: false # public SPA client, PKCE
      SupportedIdentityProviders: [Google]
      AllowedOAuthFlows: [code]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes: [openid, email, profile]
      CallbackURLs: [!Ref CognitoCallbackUrl]
      LogoutURLs: [!Ref CognitoCallbackUrl]

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: HasCognito
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Ref CognitoDomainPrefix

  # Anonymized suggestion feed (suggestion engine Phase 0): one small JSON
  # object per finished game under entries/dt=YYYY-MM-DD/. Private, written
  # only by the Lambda; the Phase 2 nightly batch will read it. Never reuse
  # SiteBucket here — deploy-frontend.sh syncs it with --delete.
  SuggestDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --- Event lake (Data Architecture Plan, Stage A) ---
  # Append-only JSONL under raw/ (real pairing ids, deletable via weekly
  # compaction) and anon/ (daily-rotating salted refs). Never reuse
  # SiteBucket (synced with --delete) or SuggestDataBucket (Phase 0 feed).
  # Versioning + 30-day noncurrent expiry is the compaction-bug safety net.
  EventLakeBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-noncurrent-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

  # Batches the stream consumer exhausts retries on (8 attempts, bisected).
  EventConsumerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600 # 14 days (SQS max)

  EventStreamConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      # Same CodeUri as ApiFunction: streamConsumer.mjs shares events.mjs
      # and deps with the single existing backend dir.
      CodeUri: backend/
      Handler: streamConsumer.handler
      Timeout: 60
      Environment:
        Variables:
          EVENT_LAKE_BUCKET: !Ref EventLakeBucket
          # Same master salt as ApiFunction; blank disables the anon zone
          # (fail closed) while raw keeps flowing.
          ANON_SALT: !Ref AnonSalt
      Policies:
        - S3WritePolicy:
            BucketName: !Ref EventLakeBucket
        # OnFailure destination sends via the function's execution role.
        - SQSSendMessagePolicy:
            QueueName: !GetAtt EventConsumerDLQ.QueueName
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt GamesTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 10
            BisectBatchOnFunctionError: true
            MaximumRetryAttempts: 8
            FunctionResponseTypes: [ReportBatchItemFailures]
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt EventConsumerDLQ.Arn
            # Only outbox inserts and pairing deletions reach the Lambda —
            # EVENT# TTL REMOVEs and PAIR#/USER#/HIST# churn never invoke it.
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName":["INSERT"],"dynamodb":{"Keys":{"pk":{"S":[{"prefix":"EVENT#"}]}}}}'
                - Pattern: '{"eventName":["REMOVE"],"dynamodb":{"Keys":{"pk":{"S":[{"prefix":"PAIR#"}]}}}}'

  # Weekly tombstone-driven raw-zone rewrite (deletion story / GDPR
  # readiness). Full-lake pass is fine at current volume (see docs).
  CompactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: compaction.handler
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          EVENT_LAKE_BUCKET: !Ref EventLakeBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref EventLakeBucket
      Events:
        Weekly:
          Type: ScheduleV2
          Properties:
            # Explicit stack-scoped name: the SAM default ("CompactionFunctionWeekly")
            # is identical for prod and preview in the same account/region, so the
            # second deploy would fail on a schedule-name conflict.
            Name: !Sub "${AWS::StackName}-compaction-weekly"
            ScheduleExpression: rate(7 days)

  # Glue catalog + partition projection (no crawler, no MSCK): adding a
  # catalog type = one line in projection.type.values (additive-only).
  GlueEventsDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref GlueDatabaseName

  GlueRawEventsTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueEventsDatabase
      TableInput:
        Name: raw_events
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          projection.enabled: "true"
          projection.type.type: enum
          projection.type.values: game_created,seat_claimed,cut_made,game_finished,rematch,push_sent,link_clicked,suggestion_accepted,fill4_used,invite_link_opened,join_abandoned,reveal_viewed,reveal_card_shared,pwa_installed,push_permission_result,suggestion_shown,fill4_shown,fill4_swapped,order_click,paywall_viewed,sub_started,sub_cancelled,tip_given,client_error,realtime_fallback,pairing_deleted
          projection.dt.type: date
          projection.dt.format: yyyy-MM-dd
          projection.dt.range: 2026-07-01,NOW
          storage.location.template: !Sub "s3://${EventLakeBucket}/raw/type=${!type}/dt=${!dt}/"
        PartitionKeys:
          - Name: type
            Type: string
          - Name: dt
            Type: string
        StorageDescriptor:
          Location: !Sub "s3://${EventLakeBucket}/raw/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
          # payload as map<string,string> (OpenX coerces scalars); per-type
          # typed views are Stage B.
          Columns:
            - Name: event_id
              Type: string
            - Name: ts
              Type: string
            - Name: schema_v
              Type: int
            - Name: pairing_ref
              Type: string
            - Name: actor_role
              Type: string
            - Name: payload
              Type: map<string,string>

  GlueAnonEventsTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueEventsDatabase
      TableInput:
        Name: anon_events
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          projection.enabled: "true"
          projection.type.type: enum
          projection.type.values: game_created,seat_claimed,cut_made,game_finished,rematch,push_sent,link_clicked,suggestion_accepted,fill4_used,invite_link_opened,join_abandoned,reveal_viewed,reveal_card_shared,pwa_installed,push_permission_result,suggestion_shown,fill4_shown,fill4_swapped,order_click,paywall_viewed,sub_started,sub_cancelled,tip_given,client_error,realtime_fallback,pairing_deleted
          projection.dt.type: date
          projection.dt.format: yyyy-MM-dd
          projection.dt.range: 2026-07-01,NOW
          storage.location.template: !Sub "s3://${EventLakeBucket}/anon/type=${!type}/dt=${!dt}/"
        PartitionKeys:
          - Name: type
            Type: string
          - Name: dt
            Type: string
        StorageDescriptor:
          Location: !Sub "s3://${EventLakeBucket}/anon/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
          Columns:
            - Name: event_id
              Type: string
            - Name: ts
              Type: string
            - Name: schema_v
              Type: int
            - Name: pairing_ref
              Type: string
            - Name: actor_role
              Type: string
            - Name: payload
              Type: map<string,string>

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-query-results
            Status: Enabled
            ExpirationInDays: 30

  EventsWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${AWS::StackName}-events"
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        ResultConfiguration:
          OutputLocation: !Sub "s3://${AthenaResultsBucket}/results/"

  # --- Frontend hosting: private S3 bucket served via CloudFront (HTTPS) ---
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # SPA fallback, scoped to the default (site) behavior only. The old
  # distribution-wide CustomErrorResponses (403/404 -> 200 index.html) would
  # corrupt API error bodies now that /api* shares the distribution.
  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-spa-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: Serve index.html for extension-less SPA routes
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (!request.uri.includes(".")) {
            request.uri = "/index.html";
          }
          return request;
        }

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        WebACLId: !If [HasWebAcl, !Ref WebAclArn, !Ref "AWS::NoValue"]
        Aliases: !If [HasCustomDomain, [!Ref CustomDomain], !Ref "AWS::NoValue"]
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: SiteS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
          # Function URL as a custom origin -> same-origin /api (no CORS
          # preflights) with WAF + edge caching in front.
          - Id: ApiFunctionOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt ApiFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
            OriginCustomHeaders: !If
              - HasOriginSecret
              - - HeaderName: x-origin-verify
                  HeaderValue: !Ref OriginVerifySecret
              - !Ref "AWS::NoValue"
        DefaultCacheBehavior:
          TargetOriginId: SiteS3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS managed "CachingOptimized" policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: "/api*"
            TargetOriginId: ApiFunctionOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            # AWS managed "CachingDisabled". Constraints that force this:
            # prod's CloudFront flat-rate pricing plan excludes custom cache
            # policies, and the only caching-enabled managed policy that
            # honors origin Cache-Control (UseOriginCacheControlHeaders-*)
            # puts `host` in the cache key — cache-key headers are always
            # forwarded, and Lambda Function URLs reject a viewer Host
            # header. If the distribution ever leaves the pricing plan,
            # restore a custom 1s-TTL policy here (keyed on the getState
            # query strings) so the edge absorbs retry storms.
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            # AWS managed "AllViewerExceptHostHeader" origin request policy
            # (Function URLs reject a forwarded viewer Host header). A custom
            # policy carrying CloudFront's viewer-geo headers was tried and
            # REJECTED by prod's flat-rate Free pricing plan (2026-07-08:
            # "Distributions with the Free pricing plan can't have: Custom
            # origin request policy") — Places location bias comes from
            # browser geolocation in the request body instead.
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # Share-link OG previews prerendered at origin (GET /j/{code}).
          # Must bypass the SPA-rewrite function (default behavior only), and
          # per-code pages must never cross-cache -> CachingDisabled.
          - PathPattern: "/j/*"
            TargetOriginId: ApiFunctionOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution.Id}"

  # NOTE: the CloudWatch ops dashboard (fed by these EMF metrics) lives in a
  # separate admin-deployed stack — ops/ops-dashboard.yaml — because the CI
  # deploy role has no cloudwatch:PutDashboard (same reason as ops/billing-alarms.yaml).
  # The metrics themselves are emitted by the Lambda regardless of the dashboard.

Outputs:
  ApiUrl:
    Description: Lambda Function URL (POST JSON actions here)
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  ApiBaseUrl:
    Description: API endpoint behind CloudFront (same-origin /api path)
    Value: !If
      - HasCustomDomain
      - !Sub "https://${CustomDomain}/api"
      - !Sub "https://${SiteDistribution.DomainName}/api"
  TableName:
    Description: DynamoDB table name
    Value: !Ref GamesTable
  VapidPublicKey:
    Description: Public key to embed in the frontend (VITE_VAPID_PUBLIC_KEY)
    Value: !Ref VapidPublicKey
  SiteBucketName:
    Description: S3 bucket to upload the built frontend (aws s3 sync dist/)
    Value: !Ref SiteBucket
  SiteUrl:
    Description: Your web app URL (open this!)
    Value: !If
      - HasCustomDomain
      - !Sub "https://${CustomDomain}"
      - !Sub "https://${SiteDistribution.DomainName}"
  DistributionDomainName:
    Description: CloudFront domain to point your DNS CNAME/alias at
    Value: !GetAtt SiteDistribution.DomainName
  DistributionId:
    Description: CloudFront distribution ID (for cache invalidations)
    Value: !Ref SiteDistribution
  CognitoDomain:
    Description: Hosted-UI domain for the frontend (VITE_COGNITO_DOMAIN)
    Condition: HasCognito
    Value: !Sub "${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
  UserPoolClientId:
    Description: Public SPA client id (VITE_COGNITO_CLIENT_ID)
    Condition: HasCognito
    Value: !Ref UserPoolClient
  PlacesEnabled:
    Description: Whether the Places typeahead layer is live (VITE_PLACES_ENABLED)
    Value: !If [HasPlacesKey, "true", "false"]
  AiEnabled:
    Description: Whether "Fill my 4" is live (VITE_AI_ENABLED)
    Value: !If [HasBedrock, "true", "false"]
  EventLakeBucketName:
    Description: S3 event lake bucket (raw/ + anon/ zones)
    Value: !Ref EventLakeBucket
  GlueDatabaseName:
    Description: Glue database with raw_events / anon_events (Athena)
    Value: !Ref GlueEventsDatabase
  AthenaWorkGroup:
    Description: Athena workgroup for event-lake queries
    Value: !Ref EventsWorkGroup
