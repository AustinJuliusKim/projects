version = 0.1

[default.deploy.parameters]
stack_name = "ChoicesWebApp"
resolve_s3 = true
s3_prefix = "ChoicesWebApp"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "VapidPublicKey=\"BL0BvvWzSES2LgK4Tq074U1rmeDVVZLWk-1sCCcoRACaxbcvtlxK_fu7lA6QWvKMOEOSRcshQcEP2bcaZkaplnY\" VapidSubject=\"mailto:austinjuliuskim@gmail.com\" CorsAllowOrigin=\"https://choices.austinjuliuskim.com\" CustomDomain=\"choices.austinjuliuskim.com\" CertificateArn=\"arn:aws:acm:us-east-1:549883968767:certificate/2ec1bd4f-b12f-4284-aad4-5997c6be9a70\""
image_repositories = []

[default.global.parameters]
region = "us-west-2"

# Preview stack for feature branches (docs/feature-deploys.md). Fully separate
# resources: own table, bucket, distribution, Lambda; no custom domain (use the
# CloudFront URL from stack outputs). VAPID keys are a dedicated preview-only
# pair — never used by prod. The PRIVATE key is deliberately not committed
# (public repo): pass it via --parameter-overrides on first stack creation;
# updates reuse the stored value (same as prod).
[preview.deploy.parameters]
stack_name = "ChoicesWebApp-preview"
resolve_s3 = true
s3_prefix = "ChoicesWebApp-preview"
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
parameter_overrides = "TableName=\"choices-games-preview\" VapidPublicKey=\"BCEqS-WSzK1WdQxxPscCUqTr4Jm8Si_xXpQVYRwrg4QKdEcGnvD7Bd-3kyLqqmMRiRKZAlYPKvrod99puL_WG7M\" VapidSubject=\"mailto:austinjuliuskim@gmail.com\" CorsAllowOrigin=\"*\""

[preview.global.parameters]
region = "us-west-2"
