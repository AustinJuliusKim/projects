# Preview stack for feature branches (docs/feature-deploys.md). Fully separate
# resources: own table, bucket, distribution, Lambda; no custom domain (use the
# CloudFront URL from stack outputs). VAPID keys are a dedicated preview-only
# pair — never used by prod. The PRIVATE key is deliberately not committed
# (public repo): pass it via --parameter-overrides on first stack creation;
# updates reuse the stored value (same as prod).
