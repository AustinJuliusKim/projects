AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Edge resources for the Choices webapp. CloudFront-scoped WAF WebACLs must
  live in us-east-1, so this is a separate stack from the main us-west-2 app
  stack (same pattern as the ACM certificate). Deploy:
    aws cloudformation deploy --template-file edge/template.yaml \
      --stack-name ChoicesWebAppEdge --region us-east-1
  Then paste the WebAclArn output into samconfig.toml parameter_overrides.

Parameters:
  BlockMode:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      false = rules only Count (soak mode: watch CloudWatch WAF metrics in
      us-east-1 for false positives). true = rules Block with a 429 response
      so the client backoff kicks in. Flip via this default once Count
      metrics show zero legitimate matches.

Conditions:
  Block: !Equals [!Ref BlockMode, "true"]

Resources:
  ApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: choices-webapp-api
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: choices-webapp-api
      Rules:
        # Per-IP rate limits over a 5-minute rolling window. Both players
        # often share a household NAT IP (plus other family devices), so
        # limits are sized for 2+ active pairings per IP: legacy dual 3s
        # polling was ~200 GETs/5min — 600 gives 3x headroom.
        - Name: RateLimitApiGet
          Priority: 10
          Action: !If
            - Block
            - Block:
                CustomResponse:
                  ResponseCode: 429
            - Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: choices-rate-api-get
          Statement:
            RateBasedStatement:
              Limit: 600
              AggregateKeyType: IP
              ScopeDownStatement:
                AndStatement:
                  Statements:
                    - ByteMatchStatement:
                        FieldToMatch:
                          UriPath: {}
                        PositionalConstraint: STARTS_WITH
                        SearchString: /api
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                    - ByteMatchStatement:
                        FieldToMatch:
                          Method: {}
                        PositionalConstraint: EXACTLY
                        SearchString: GET
                        TextTransformations:
                          - Priority: 0
                            Type: NONE

        # A frantic couple sends well under 30 mutations in 5 minutes.
        - Name: RateLimitApiPost
          Priority: 20
          Action: !If
            - Block
            - Block:
                CustomResponse:
                  ResponseCode: 429
            - Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: choices-rate-api-post
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: IP
              ScopeDownStatement:
                AndStatement:
                  Statements:
                    - ByteMatchStatement:
                        FieldToMatch:
                          UriPath: {}
                        PositionalConstraint: STARTS_WITH
                        SearchString: /api
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                    - ByteMatchStatement:
                        FieldToMatch:
                          Method: {}
                        PositionalConstraint: EXACTLY
                        SearchString: POST
                        TextTransformations:
                          - Priority: 0
                            Type: NONE

        # The join-code namespace is tiny (16 words x 90 numbers = 1,440
        # codes), so pairing-creation flooding is the real DoS/cost vector.
        # 10 is the WAF minimum limit and still generous for a human.
        - Name: RateLimitCreatePairing
          Priority: 30
          Action: !If
            - Block
            - Block:
                CustomResponse:
                  ResponseCode: 429
            - Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: choices-rate-create-pairing
          Statement:
            RateBasedStatement:
              Limit: 10
              AggregateKeyType: IP
              ScopeDownStatement:
                AndStatement:
                  Statements:
                    - ByteMatchStatement:
                        FieldToMatch:
                          UriPath: {}
                        PositionalConstraint: STARTS_WITH
                        SearchString: /api
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                    - ByteMatchStatement:
                        FieldToMatch:
                          Body:
                            OversizeHandling: CONTINUE
                        PositionalConstraint: CONTAINS
                        SearchString: '"createPairing"'
                        TextTransformations:
                          - Priority: 0
                            Type: NONE

Outputs:
  WebAclArn:
    Description: Paste into samconfig.toml parameter_overrides as WebAclArn
    Value: !GetAtt ApiWebAcl.Arn
