name: choices-webapp CI

on:
  push:
    branches: [main]
    paths:
      - "apps/choices-webapp/**"
      - ".github/workflows/choices-webapp.yml"
  pull_request:
    paths:
      - "apps/choices-webapp/**"
      - ".github/workflows/choices-webapp.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/choices-webapp/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15 # matches the Lambda runtime (nodejs24.x)
          cache: npm
          cache-dependency-path: apps/choices-webapp/backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/choices-webapp/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: apps/choices-webapp/frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  # PR previews: every same-repo PR touching the app redeploys the single
  # shared preview stack (last-writer-wins; concurrency serializes runs).
  # Fork PRs are skipped — GitHub withholds the OIDC token there anyway.
  # Requires the deploy role's trust policy to allow the `pull_request` sub
  # and the bucket patterns broadened to `choiceswebapp*` (docs/iam-policy.json,
  # docs/feature-deploys.md).
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for OIDC role assumption
      contents: read
      pull-requests: write # preview-URL comment
    concurrency:
      group: choices-webapp-preview-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/choices-webapp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: apps/choices-webapp/frontend/package-lock.json
      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::549883968767:role/choices-webapp-github-deploy
          aws-region: us-west-2
      - run: sam build
      # Inject the Stripe Test-mode secrets + AdminSubs (from GitHub Actions
      # secrets/variables) so the preview stack can fully exercise payment
      # flows. NOTE: `--parameter-overrides` on the CLI REPLACES samconfig's
      # list (it does not merge per-key), so this repeats the [preview]
      # non-secret params — keep in sync with samconfig.toml [preview]. Each
      # secret is appended only when set: SAM rejects an empty "Key=" value,
      # and an omitted param keeps its retained stack value.
      - name: Deploy preview stack (with Stripe test secrets)
        env:
          PREVIEW_STRIPE_SECRET_KEY: ${{ secrets.PREVIEW_STRIPE_SECRET_KEY }}
          PREVIEW_STRIPE_WEBHOOK_SECRET: ${{ secrets.PREVIEW_STRIPE_WEBHOOK_SECRET }}
          # AdminSubs may live as a repo variable or secret — accept either.
          PREVIEW_ADMIN_SUBS: ${{ vars.PREVIEW_ADMIN_SUBS || secrets.PREVIEW_ADMIN_SUBS }}
        run: |
          params=(
            TableName=choices-games-preview
            GlueDatabaseName=choices_events_preview
            VapidPublicKey=BCEqS-WSzK1WdQxxPscCUqTr4Jm8Si_xXpQVYRwrg4QKdEcGnvD7Bd-3kyLqqmMRiRKZAlYPKvrod99puL_WG7M
            VapidSubject=mailto:austinjuliuskim@gmail.com
            'CorsAllowOrigin=*'
            GoogleClientId=240909566780-pbki19loi4ou5hmb3780l4672f9d357b.apps.googleusercontent.com
            CognitoDomainPrefix=choices-auth-preview
            CognitoCallbackUrl=https://d3r33durbg7s1k.cloudfront.net/
            StripePriceMonthly=price_1TpzGYIVveMhKb5YH2DIAGcr
            StripePriceAnnual=price_1TpzGjIVveMhKb5YRATUAc1o
            BedrockModelId=us.anthropic.claude-haiku-4-5-20251001-v1:0
          )
          if [ -n "$PREVIEW_STRIPE_SECRET_KEY" ]; then params+=("StripeSecretKey=$PREVIEW_STRIPE_SECRET_KEY"); fi
          if [ -n "$PREVIEW_STRIPE_WEBHOOK_SECRET" ]; then params+=("StripeWebhookSecret=$PREVIEW_STRIPE_WEBHOOK_SECRET"); fi
          if [ -n "$PREVIEW_ADMIN_SUBS" ]; then params+=("AdminSubs=$PREVIEW_ADMIN_SUBS"); fi
          sam deploy --config-env preview --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides "${params[@]}"
      - run: npm ci
        working-directory: apps/choices-webapp/frontend
      - run: STACK_NAME=ChoicesWebApp-preview ./deploy-frontend.sh
        env:
          VITE_TIP_VENMO_URL: ${{ vars.VITE_TIP_VENMO_URL }}
          VITE_TIP_STRIPE_URL: ${{ vars.VITE_TIP_STRIPE_URL }}
          VITE_RUM_MONITOR_ID: ${{ vars.VITE_RUM_MONITOR_ID }}
          VITE_RUM_REGION: ${{ vars.VITE_RUM_REGION }}
          VITE_RUM_IDENTITY_POOL_ID: ${{ vars.VITE_RUM_IDENTITY_POOL_ID }}
          VITE_RUM_GUEST_ROLE_ARN: ${{ vars.VITE_RUM_GUEST_ROLE_ARN }}
      # One comment per PR (on open/reopen); pushes just redeploy silently.
      - name: Comment preview URL
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          url=$(aws cloudformation describe-stacks --stack-name ChoicesWebApp-preview \
            --query "Stacks[0].Outputs[?OutputKey=='SiteUrl'].OutputValue" --output text)
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
            --body "🔍 Preview deployed: $url — shared stack, updated on every push to any open choices-webapp PR (last deploy wins)."

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for OIDC role assumption
      contents: read
    concurrency:
      group: choices-webapp-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/choices-webapp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: apps/choices-webapp/frontend/package-lock.json
      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::549883968767:role/choices-webapp-github-deploy
          aws-region: us-west-2
      - run: sam build
      - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
      - run: npm ci
        working-directory: apps/choices-webapp/frontend
      - run: ./deploy-frontend.sh
        env:
          # Repo variables; unset -> empty -> tip UI stays hidden.
          VITE_TIP_VENMO_URL: ${{ vars.VITE_TIP_VENMO_URL }}
          VITE_TIP_STRIPE_URL: ${{ vars.VITE_TIP_STRIPE_URL }}
          VITE_RUM_MONITOR_ID: ${{ vars.VITE_RUM_MONITOR_ID }}
          VITE_RUM_REGION: ${{ vars.VITE_RUM_REGION }}
          VITE_RUM_IDENTITY_POOL_ID: ${{ vars.VITE_RUM_IDENTITY_POOL_ID }}
          VITE_RUM_GUEST_ROLE_ARN: ${{ vars.VITE_RUM_GUEST_ROLE_ARN }}
