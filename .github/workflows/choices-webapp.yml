name: choices-webapp CI

on:
  push:
    branches: [main]
    paths:
      - "apps/choices-webapp/**"
      - ".github/workflows/choices-webapp.yml"
  pull_request:
    paths:
      - "apps/choices-webapp/**"
      - ".github/workflows/choices-webapp.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/choices-webapp/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15 # matches the Lambda runtime (nodejs24.x)
          cache: npm
          cache-dependency-path: apps/choices-webapp/backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/choices-webapp/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: apps/choices-webapp/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for OIDC role assumption
      contents: read
    concurrency:
      group: choices-webapp-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/choices-webapp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: apps/choices-webapp/frontend/package-lock.json
      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::549883968767:role/choices-webapp-github-deploy
          aws-region: us-west-2
      # Edge stack first (us-east-1: CloudFront-scoped WAF) so rate-limit
      # tuning in edge/template.yaml ships from git like everything else.
      - run: >
          aws cloudformation deploy
          --template-file edge/template.yaml
          --stack-name ChoicesWebAppEdge
          --region us-east-1
          --no-fail-on-empty-changeset
      - run: sam build
      - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
      - run: npm ci
        working-directory: apps/choices-webapp/frontend
      - run: ./deploy-frontend.sh
