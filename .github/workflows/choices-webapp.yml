name: choices-webapp CI

on:
  push:
    branches: [main]
    paths:
      - "apps/choices-webapp/**"
      - ".github/workflows/choices-webapp.yml"
  pull_request:
    paths:
      - "apps/choices-webapp/**"
      - ".github/workflows/choices-webapp.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/choices-webapp/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # matches the Lambda runtime (nodejs22.x)
          cache: npm
          cache-dependency-path: apps/choices-webapp/backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/choices-webapp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/choices-webapp/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
