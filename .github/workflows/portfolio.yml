name: portfolio CI

on:
  push:
    branches: [main]
    paths:
      - "apps/portfolio/**"
      - ".github/workflows/portfolio.yml"
  pull_request:
    paths:
      - "apps/portfolio/**"
      - ".github/workflows/portfolio.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portfolio
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20.13
          cache: npm
          cache-dependency-path: apps/portfolio/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for OIDC role assumption
      contents: read
    concurrency:
      group: portfolio-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/portfolio
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20.13
          cache: npm
          cache-dependency-path: apps/portfolio/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::549883968767:role/portfolio-github-deploy
          aws-region: us-west-2
      - name: Check deploy-params.json is filled in
        run: |
          CERT_ARN=$(node -pe "require('./deploy-params.json').CertificateArn")
          if [ "$CERT_ARN" = "FILL_AFTER_BOOTSTRAP" ]; then
            echo "::error::deploy-params.json CertificateArn is still FILL_AFTER_BOOTSTRAP. Run scripts/bootstrap-infra.sh first." >&2
            exit 1
          fi
      - name: Deploy CloudFormation stack
        run: |
          STACK_NAME=$(node -pe "require('./deploy-params.json').StackName")
          REGION=$(node -pe "require('./deploy-params.json').Region")
          CUSTOM_DOMAIN=$(node -pe "require('./deploy-params.json').CustomDomain")
          CERT_ARN=$(node -pe "require('./deploy-params.json').CertificateArn")
          aws cloudformation deploy \
            --template-file template.yaml \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --parameter-overrides "CustomDomain=$CUSTOM_DOMAIN" "CertificateArn=$CERT_ARN" \
            --no-fail-on-empty-changeset
      - run: ./deploy-frontend.sh
